name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, sign, package and publish
    # macos-26 runner ships with Xcode 17 + macOS 26 SDK — required for the
    # Liquid Glass APIs (GlassEffectContainer, glassEffect, .glassProminent)
    # used in the SwiftUI views. Earlier runners (macos-14/15) compile-fail
    # because the symbols aren't in the SDK even though guarded by
    # `if #available(macOS 26.0, *)`.
    runs-on: macos-26
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      SPARKLE_VERSION: '2.6.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version string
        id: version
        run: |
          RAW="${VERSION}"
          CLEAN="${RAW#v}"
          echo "marketing=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "Marketing version: $CLEAN"

      - name: Select latest Xcode (must include macOS 26 SDK)
        run: |
          # Pick the highest-numbered Xcode installed on the runner. macos-26
          # ships with Xcode 17.x by default, which contains the Liquid Glass
          # APIs we need.
          LATEST_XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$LATEST_XCODE" ]; then
            echo "No Xcode_*.app found in /Applications — falling back to xcode-select default."
          else
            echo "Selecting $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE"
          fi
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Download Sparkle release tools
        run: |
          mkdir -p .sparkle-tools
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o .sparkle-tools/sparkle.tar.xz
          tar -xJf .sparkle-tools/sparkle.tar.xz -C .sparkle-tools
          ls .sparkle-tools/bin

      - name: Embed Sparkle EdDSA public key into Info.plist
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          if [ -z "$SPARKLE_PUBLIC_KEY" ]; then
            echo "::warning::SPARKLE_PUBLIC_KEY secret is not set; appcast signature verification will fail at runtime."
          else
            /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey $SPARKLE_PUBLIC_KEY" Info.plist
          fi

      - name: Build, bundle and sign app
        env:
          VERSION: ${{ steps.version.outputs.marketing }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY || '-' }}
        run: ./scripts/build_app.sh

      - name: Notarize (skipped if Apple credentials are not configured)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Skipping notarization — Apple credentials are not set. The DMG will be ad-hoc signed only."
            exit 0
          fi
          ditto -c -k --sequesterRsrc --keepParent dist/LampControl.app dist/LampControl-notarize.zip
          xcrun notarytool submit dist/LampControl-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/LampControl.app
          rm dist/LampControl-notarize.zip

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.marketing }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY || '-' }}
        run: ./scripts/build_dmg.sh

      - name: Stage release artifact (rename DMG with version)
        id: stage
        run: |
          VERSIONED_DMG="dist/LampControl-${{ steps.version.outputs.marketing }}.dmg"
          mv dist/LampControl.dmg "$VERSIONED_DMG"
          echo "dmg=$VERSIONED_DMG" >> "$GITHUB_OUTPUT"

      - name: Sign DMG with Sparkle EdDSA private key
        id: appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is required to sign the appcast."
            exit 1
          fi

          mkdir -p .sparkle-keys
          # Use printf without trailing newline — Sparkle's sign_update reads
          # the key file exactly and a trailing \n will turn the base64 EdDSA
          # key into something it can't decode.
          printf '%s' "$SPARKLE_PRIVATE_KEY" > .sparkle-keys/private_key
          chmod 600 .sparkle-keys/private_key

          KEY_BYTES=$(wc -c < .sparkle-keys/private_key | tr -d ' ')
          echo "private_key file is $KEY_BYTES bytes (expect ~64 base64 chars for an EdDSA key, no trailing newline)"
          ls -la .sparkle-tools/bin/sign_update
          .sparkle-tools/bin/sign_update --help 2>&1 | head -10 || true

          # Capture both stdout + stderr + exit code so we can surface the real
          # failure instead of dying silently under `set -e`.
          set +e
          SIGN_OUTPUT=$(.sparkle-tools/bin/sign_update -f .sparkle-keys/private_key "${{ steps.stage.outputs.dmg }}" 2>&1)
          SIGN_EXIT=$?
          set -e

          echo "sign_update exit code: $SIGN_EXIT"
          echo "sign_update output:"
          echo "$SIGN_OUTPUT"

          rm -rf .sparkle-keys

          if [ "$SIGN_EXIT" -ne 0 ]; then
            echo "::error::sign_update failed (exit $SIGN_EXIT). See output above."
            exit "$SIGN_EXIT"
          fi

          echo "signature_line=$SIGN_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml entry
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          SIGNATURE_LINE: ${{ steps.appcast.outputs.signature_line }}
          DMG_PATH: ${{ steps.stage.outputs.dmg }}
        run: |
          mkdir -p public
          DMG_FILENAME="$(basename "$DMG_PATH")"
          DMG_LENGTH="$(stat -f%z "$DMG_PATH")"
          PUB_DATE="$(date -u +"%a, %d %b %Y %H:%M:%S +0000")"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${MARKETING_VERSION}/${DMG_FILENAME}"

          cat > public/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>LampControl</title>
              <link>https://huggooo26.github.io/LampControl/appcast.xml</link>
              <description>Most recent LampControl updates</description>
              <language>en</language>
              <item>
                <title>Version ${MARKETING_VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${MARKETING_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <description><![CDATA[See the <a href="https://github.com/${{ github.repository }}/releases/tag/v${MARKETING_VERSION}">release notes</a> on GitHub.]]></description>
                <enclosure url="${DOWNLOAD_URL}" length="${DMG_LENGTH}" type="application/octet-stream" ${SIGNATURE_LINE} />
              </item>
            </channel>
          </rss>
          EOF

          echo "Generated appcast:"
          cat public/appcast.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.marketing }}
          name: LampControl v${{ steps.version.outputs.marketing }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.dmg }}

  deploy-pages:
    name: Publish appcast to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
